# Build manifest — replayed by the netlinux dev pipeline.
# Not auto-triggered in GHA; use `gh workflow run release-deb.yml` to
# run manually on a GitHub-hosted runner.
name: Build .deb package (dual-suite)
true:
  push:
    branches:
    - main
permissions:
  contents: write
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
        - target: bookworm
          container: debian:bookworm
        - target: resolute
          container: ubuntu:26.04
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
    steps:
    - name: Bootstrap container
      run: "apt-get update\napt-get install -y --no-install-recommends \\\n  ca-certificates curl git xz-utils zstd \\\n \
        \ build-essential dpkg-dev sudo\n"
    - uses: actions/checkout@v4
    - name: Determine version
      id: version
      run: 'UPSTREAM_VER="2.38.2"

        rev=${{ github.run_number }}

        echo "upstream=${UPSTREAM_VER}" >> "$GITHUB_OUTPUT"

        echo "version=${UPSTREAM_VER}-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"

        echo "tag=v${UPSTREAM_VER}-${rev}netlinux1~${{ matrix.target }}1" >> "$GITHUB_OUTPUT"

        '
    - name: Download upstream release
      run: "curl -sL -o snappymail.tar.gz \\\n  \"https://github.com/the-djmaze/snappymail/releases/download/v${{ steps.version.outputs.upstream\
        \ }}/snappymail-${{ steps.version.outputs.upstream }}.tar.gz\"\nmkdir -p snappymail-src\ntar xzf snappymail.tar.gz\
        \ -C snappymail-src\n"
    - name: Package with checkinstall
      run: "apt-get update\napt-get install -y checkinstall\ncheckinstall --default \\\n  --pkgname=snappymail \\\n  --pkgversion=\"\
        ${{ steps.version.outputs.version }}\" \\\n  --maintainer=\"graham@netlinux.co.uk\" \\\n  --requires=\"nginx,php-fpm,php-curl,php-gd,php-intl,php-mbstring,php-xml,php-zip,php-sqlite3,php-gnupg\"\
        \ \\\n  --pakdir=. \\\n  --install=no \\\n  --fstrans=yes \\\n  make install\n"
    - name: Repack .deb for reprepro compatibility
      run: "DEB=$(ls snappymail_*.deb)\nchmod 666 \"$DEB\"\nmkdir repack && cd repack\nar x \"../$DEB\"\nfor f in *.zst; do\n\
        \  [ -f \"$f\" ] || continue\n  zstd -d \"$f\"\n  xz \"${f%.zst}\"\n  rm \"$f\"\ndone\nrm \"../$DEB\"\nar rcs \"../$DEB\"\
        \ debian-binary control.tar.xz data.tar.xz\n"
    - uses: actions/upload-artifact@v4
      with:
        name: deb-${{ matrix.target }}
        path: '**/*.deb

          '
        if-no-files-found: error
  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
    - name: Compute tag
      id: tag
      run: echo "tag=v${{ github.run_number }}-dualsuite" >> "$GITHUB_OUTPUT"
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Build ${{ github.run_number }} (bookworm + resolute)
        body: 'Dual-suite build from commit ${{ github.sha }}.

          Both ~bookworm1 and ~resolute1 .debs are attached.

          '
        files: artifacts/**/*.deb
        fail_on_unmatched_files: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Notify package repository
      run: "sleep 5\nPAYLOAD='{\"repo\":\"netlinux-ai/snappymail\",\"tag\":\"${{ steps.tag.outputs.tag }}\"}'\nSIGNATURE=$(echo\
        \ -n \"$PAYLOAD\" \\\n  | openssl dgst -sha256 -hmac \"${{ secrets.WEBHOOK_SECRET }}\" -binary \\\n  | xxd -p -c 256)\n\
        curl -sf -X POST \\\n  -H \"Content-Type: application/json\" \\\n  -H \"X-Webhook-Signature: sha256=${SIGNATURE}\"\
        \ \\\n  -d \"$PAYLOAD\" \\\n  https://packages.netlinux.co.uk/webhook/update-repo\n"
'on':
  workflow_dispatch: null
